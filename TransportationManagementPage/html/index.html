<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportation Management - Egypt Tourism Hub</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Egypt Tourism Hub - Transportation Manager</div>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="transport-management.html">Vehicles</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="page-header">
            <h1>Transportation Management</h1>
            <p>Manage vehicles and transportation bookings</p>
        </section>

        <section id="add-vehicle-section">
            <h3>Add New Vehicle</h3>
            <form id="add-vehicle-form">
                <div>
                    <label>Vehicle Type:</label>
                    <input type="text" id="vehicle-type" placeholder="e.g., Bus, Minivan, Car" required>
                </div>
                <div>
                    <label>Capacity (people):</label>
                    <input type="number" id="vehicle-capacity" min="1" max="50" required>
                </div>
                <div>
                    <label>Driver Name:</label>
                    <input type="text" id="vehicle-driver" placeholder="Driver name" required>
                </div>
                <div>
                    <label>License Plate:</label>
                    <input type="text" id="vehicle-plate" placeholder="ABC-123" required>
                </div>
                <div>
                    <label>Status:</label>
                    <select id="vehicle-status">
                        <option value="available">Available</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="booked">Booked</option>
                    </select>
                </div>
                <button type="submit">Add Vehicle</button>
                <button type="reset">Clear</button>
            </form>
        </section>

        <section id="filter-section">
            <h3>Filter Vehicles</h3>
            <div>
                <label>Status:</label>
                <select id="status-filter">
                    <option value="all">All</option>
                    <option value="available">Available</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="booked">Booked</option>
                </select>
            </div>
            <div>
                <label>Search:</label>
                <input type="text" id="search-input" placeholder="Search by type or driver...">
                <button id="search-btn">Search</button>
                <button id="reset-btn">Reset</button>
            </div>
        </section>

        <section id="vehicles-section">
            <h3>Vehicle Fleet</h3>
            <div id="vehicles-list"></div>
        </section>

        <section id="bookings-section">
            <h3>Pending Transportation Bookings</h3>
            <div id="bookings-list"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Egypt Tourism Hub</p>
    </footer>

    <script src="js/transport-management.js"></script>
</body>
</html>
