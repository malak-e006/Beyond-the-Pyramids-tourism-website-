<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Name - Egypt Tourism Hub</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>
   
    <header>
        <nav>
            <div class="d1">Egypt Tourism Hub</div>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="MyBookings.html">My Bookings</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    
    <main>
        <section id="loc-header">
            <h1 id="location-name">Loading...</h1>
            <div id="location-rating"></div>
        </section>

        <section id="loc-gallery">
            <div id="main-image"></div>
            <div id="thumbnail-list"></div>
        </section>

        <section id="loc-info">
            <h2>About This Location</h2>
            <p id="location-description"></p>
            <div id="location-highlights"></div>
        </section>

        <section id="historical-facts">
            <h3>Historical Facts</h3>
            <ul id="facts-list"></ul>
        </section>

        <section id="booking">
            <h2>Book Your Visit</h2>
            <form id="booking-form">
                <div>
                    <label for="visit-date">Select Date:</label>
                    <input type="date" id="visit-date" required>
                </div>

                <div>
                    <label>Select Time Slot:</label>
                    <div id="time-slots-container"></div>
                </div>
                <div>
                    <label for="quantity">Number of People:</label>
                    <input type="number" id="quantity" min="1" max="20" value="1">
                </div>
                <div>
                    <label>Tourist Guide (Optional):</label>
                    <select id="guide-select">
                        <option value="">No Guide Needed</option>
                    </select>
                </div>
                <div id="price-calc">
                    <p>Base Price: $<span id="base-price">0</span></p>
                    <p>Guide Fee: $<span id="guide-fee">0</span></p>
                    <p>Total Price: $<span id="total-price">0</span></p>
                </div>
                <button type="submit">Book Now</button>
                <button type="button" id="add-to-cart">Add to Cart</button>
            </form>
        </section>

        <section id="reviews-section">
            <h3>Visitor Reviews</h3>
            <div id="reviews-container"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Egypt Tourism Hub</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
